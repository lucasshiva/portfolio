<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="100%" height="100%">
  <defs>
    <style>
      /* Light mode styles (Default) */
      .bg { fill: #ffffff; }
      .bracket { stroke: #1e293b; }
      .slash { stroke: #818cf8; }

      /* Dark mode overrides */
      @media (prefers-color-scheme: dark) {
        .bg { fill: #0c1221; }
        .bracket { stroke: #e2e8f0; }
        .slash { stroke: #818cf8; }
      }
    </style>
  </defs>

  <rect class="bg" width="32" height="32" rx="7" />

  <g stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path class="bracket" stroke-width="2.5" d="M10 11l-4 5 4 5" />
    
    <path class="bracket" stroke-width="2.5" d="M22 11l4 5-4 5" />
    
    <path class="slash" stroke-width="2.5" d="M18 9l-4 14" />
  </g>
</svg>
